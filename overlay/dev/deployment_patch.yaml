apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
spec:
  template:
    spec:
      containers:
        - name: app-container
          image: ghcr.io/opeyemiogungbe/kustomize-capstone:dev
          env:
            - name: APP_ENV
              value: development
            - name: LOG_LEVEL
              value: debug
