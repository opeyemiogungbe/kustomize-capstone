apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: my-app

  template:
    metadata:
      labels:
        app: my-app

    spec:
      containers:
        - name: app-container
          image: myapp:latest
          ports:
            - containerPort: 80
          envFrom:
            - secretRef:
                name: my-secret